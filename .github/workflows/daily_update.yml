name: Daily Investment Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        run: python scripts/update_report.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/report.json
          git commit -m "Update daily investment report" || echo "No changes to commit"
          git push
