<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 投資健診儀表板</title>
  <style>
    body {
      font-family: "Noto Sans TC", Arial, sans-serif;
      margin: 0;
      background: #f5f6fa;
      color: #222;
    }
    header {
      background: #1f2937;
      color: white;
      padding: 24px;
      text-align: center;
    }
    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .card h2 {
      margin-top: 0;
      font-size: 18px;
      color: #374151;
    }
    .value {
      font-size: 28px;
      font-weight: bold;
      margin: 8px 0;
    }
    .positive {
      color: #16a34a;
    }
    .warning {
      color: #f59e0b;
    }
    .danger {
      color: #dc2626;
    }
    .neutral {
      color: #2563eb;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    th, td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }
    th {
      background: #f3f4f6;
    }
    .section-title {
      margin-top: 32px;
      margin-bottom: 12px;
      font-size: 22px;
    }
    .updated {
      font-size: 14px;
      color: #6b7280;
      margin-top: 8px;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 16px;
      border-radius: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>AI 投資健診儀表板</h1>
    <p>個股 / ETF / 基金 / 多帳戶資產總覽</p>
    <div class="updated" id="updatedAt">資料載入中...</div>
  </header>

  <main>
    <div id="app">資料載入中...</div>
  </main>

  <script>
    function getRiskClass(text) {
      if (!text) return "neutral";
      if (text.includes("高")) return "danger";
      if (text.includes("中")) return "warning";
      if (text.includes("低") || text.includes("穩健")) return "positive";
      return "neutral";
    }

    function renderDashboard(data) {
      document.getElementById("updatedAt").textContent = "最後更新：" + data.updated_at;

      const riskClass = getRiskClass(data.market.risk_level);
      const familyClass = getRiskClass(data.family_status.status);

      const accountsRows = data.accounts.map(account => `
        <tr>
          <td>${account.name}</td>
          <td>${account.goal}</td>
          <td>${account.risk_profile}</td>
          <td>${account.advice}</td>
        </tr>
      `).join("");

      const watchlistRows = data.watchlist.map(item => `
        <tr>
          <td>${item.type}</td>
          <td>${item.name}</td>
          <td>${item.status}</td>
          <td>${item.advice}</td>
        </tr>
      `).join("");

      document.getElementById("app").innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>今日市場風險</h2>
            <div class="value ${riskClass}">${data.market.risk_level}</div>
            <p>${data.market.summary}</p>
          </div>

          <div class="card">
            <h2>家庭總資產狀態</h2>
            <div class="value ${familyClass}">${data.family_status.status}</div>
            <p>${data.family_status.summary}</p>
          </div>

          <div class="card">
            <h2>今日 AI 總建議</h2>
            <div class="value neutral">${data.market.overall_advice}</div>
            <p>定期定額照扣，單筆加碼等待更明確訊號。</p>
          </div>
        </div>

        <h2 class="section-title">帳戶總覽</h2>
        <table>
          <thead>
            <tr>
              <th>帳戶</th>
              <th>投資目的</th>
              <th>風險屬性</th>
              <th>AI 建議</th>
            </tr>
          </thead>
          <tbody>
            ${accountsRows}
          </tbody>
        </table>

        <h2 class="section-title">今日需要注意的標的</h2>
        <table>
          <thead>
            <tr>
              <th>類型</th>
              <th>名稱</th>
              <th>狀態</th>
              <th>AI 建議</th>
            </tr>
          </thead>
          <tbody>
            ${watchlistRows}
          </tbody>
        </table>
      `;
    }

    fetch("data/report.json")
      .then(response => {
        if (!response.ok) {
          throw new Error("無法讀取 data/report.json");
        }
        return response.json();
      })
      .then(data => renderDashboard(data))
      .catch(error => {
        document.getElementById("app").innerHTML = `
          <div class="error">
            資料載入失敗：${error.message}<br>
            請確認 data/report.json 是否已建立，且 JSON 格式正確。
          </div>
        `;
      });
  </script>
</body>
</html>
