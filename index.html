<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 投資健診儀表板</title>
  <style>
    body {
      font-family: "Noto Sans TC", Arial, sans-serif;
      margin: 0;
      background: #f5f6fa;
      color: #222;
    }
    header {
      background: #1f2937;
      color: white;
      padding: 48px 24px 36px;
      text-align: center;
    }
    header h1 {
      font-size: 40px;
      margin: 0 0 20px;
    }
    header p {
      font-size: 22px;
      margin: 0 0 20px;
    }
    main {
      max-width: 1200px;
      margin: 28px auto;
      padding: 0 16px 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .card h2 {
      margin-top: 0;
      font-size: 20px;
      color: #374151;
    }
    .value {
      font-size: 32px;
      font-weight: bold;
      margin: 12px 0;
      line-height: 1.35;
    }
    .positive {
      color: #16a34a;
    }
    .warning {
      color: #f59e0b;
    }
    .danger {
      color: #dc2626;
    }
    .neutral {
      color: #2563eb;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }
    th, td {
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
      color: #374151;
      white-space: nowrap;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .section-title {
      margin-top: 34px;
      margin-bottom: 14px;
      font-size: 24px;
      color: #111827;
    }
    .updated {
      font-size: 15px;
      color: #94a3b8;
      margin-top: 8px;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 16px;
      border-radius: 12px;
      margin-top: 24px;
    }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e5e7eb;
      font-size: 13px;
      color: #374151;
    }
    .note {
      color: #6b7280;
      font-size: 14px;
      margin-top: -6px;
      margin-bottom: 16px;
    }
    @media (max-width: 720px) {
      header h1 {
        font-size: 30px;
      }
      header p {
        font-size: 18px;
      }
      table {
        font-size: 14px;
      }
      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI 投資健診儀表板</h1>
    <p>個股 / ETF / 基金 / 多帳戶資產總覽</p>
    <div class="updated" id="updatedAt">資料載入中...</div>
  </header>

  <main>
    <div id="app">資料載入中...</div>
  </main>

  <script>
    function getRiskClass(text) {
      if (!text) return "neutral";
      if (text.includes("高")) return "danger";
      if (text.includes("中")) return "warning";
      if (text.includes("低") || text.includes("穩健")) return "positive";
      return "neutral";
    }

    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "-";
      if (typeof value === "number") {
        return value.toLocaleString("zh-TW");
      }
      return value;
    }

    function renderDashboard(report, portfolio) {
      document.getElementById("updatedAt").textContent = "最後更新：" + report.updated_at;

      const riskClass = getRiskClass(report.market.risk_level);
      const familyClass = getRiskClass(report.family_status.status);

      const accountsRows = report.accounts.map(account => `
        <tr>
          <td>${account.name}</td>
          <td>${account.goal}</td>
          <td>${account.risk_profile}</td>
          <td>${account.advice}</td>
        </tr>
      `).join("");

      const watchlistRows = report.watchlist.map(item => `
        <tr>
          <td><span class="tag">${item.type}</span></td>
          <td>${item.name}</td>
          <td>${item.status}</td>
          <td>${item.advice}</td>
        </tr>
      `).join("");

      const holdingsRows = portfolio.holdings.map(item => `
        <tr>
          <td>${item.account}</td>
          <td><span class="tag">${item.type}</span></td>
          <td>${item.symbol || "-"}</td>
          <td>${item.name}</td>
          <td>${item.currency}</td>
          <td>${formatNumber(item.quantity)}</td>
          <td>${formatNumber(item.avg_cost)}</td>
          <td>${item.purpose}</td>
          <td>${item.strategy}</td>
        </tr>
      `).join("");

      document.getElementById("app").innerHTML = `
        <div class="grid">
          <div class="card">
            <h2>今日市場風險</h2>
            <div class="value ${riskClass}">${report.market.risk_level}</div>
            <p>${report.market.summary}</p>
          </div>

          <div class="card">
            <h2>家庭總資產狀態</h2>
            <div class="value ${familyClass}">${report.family_status.status}</div>
            <p>${report.family_status.summary}</p>
          </div>

          <div class="card">
            <h2>今日 AI 總建議</h2>
            <div class="value neutral">${report.market.overall_advice}</div>
            <p>定期定額照扣，單筆加碼等待更明確訊號。</p>
          </div>
        </div>

        <h2 class="section-title">帳戶總覽</h2>
        <table>
          <thead>
            <tr>
              <th>帳戶</th>
              <th>投資目的</th>
              <th>風險屬性</th>
              <th>AI 建議</th>
            </tr>
          </thead>
          <tbody>
            ${accountsRows}
          </tbody>
        </table>

        <h2 class="section-title">今日需要注意的標的</h2>
        <table>
          <thead>
            <tr>
              <th>類型</th>
              <th>名稱</th>
              <th>狀態</th>
              <th>AI 建議</th>
            </tr>
          </thead>
          <tbody>
            ${watchlistRows}
          </tbody>
        </table>

        <h2 class="section-title">投資商品總表</h2>
        <p class="note">目前先使用範例資料，之後可以改成你的真實帳戶，但公開網站不建議顯示完整金額。</p>
        <table>
          <thead>
            <tr>
              <th>帳戶</th>
              <th>類型</th>
              <th>代號</th>
              <th>商品名稱</th>
              <th>幣別</th>
              <th>數量</th>
              <th>成本 / 本金</th>
              <th>投資目的</th>
              <th>策略</th>
            </tr>
          </thead>
          <tbody>
            ${holdingsRows}
          </tbody>
        </table>
      `;
    }

    Promise.all([
      fetch("data/report.json").then(response => {
        if (!response.ok) throw new Error("無法讀取 data/report.json");
        return response.json();
      }),
      fetch("data/portfolio.json").then(response => {
        if (!response.ok) throw new Error("無法讀取 data/portfolio.json");
        return response.json();
      })
    ])
      .then(([report, portfolio]) => renderDashboard(report, portfolio))
      .catch(error => {
        document.getElementById("app").innerHTML = `
          <div class="error">
            資料載入失敗：${error.message}<br>
            請確認 data/report.json 與 data/portfolio.json 是否已建立，且 JSON 格式正確。
          </div>
        `;
      });
  </script>
</body>
</html>
